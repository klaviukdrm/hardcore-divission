<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/">
    <title>Admin | Hardcore Division</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/x-icon" href="favicon/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
    <link rel="manifest" href="favicon/site.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/styles.css">
</head>
<body>
<header>
    <div class="logo-container">
        <h1 class="logo"><a href="/pages/index.html" style="text-decoration:none; color:inherit;">HARDCORE DIVISION</a></h1>
    </div>
</header>

<main class="container account-shell">
    <section class="panel-card">
        <h2 class="panel-title">Admin Panel</h2>
        <p class="panel-subtitle">Керування замовленнями через захищений серверний API</p>

        <div id="adminMessage" class="panel-message" aria-live="polite"></div>

        <form id="adminLoginForm" class="panel-form admin-login" novalidate>
            <h3>Вхід адміністратора</h3>
            <label class="field-label" for="adminPassword">Пароль адмінки</label>
            <input id="adminPassword" type="password" required>
            <button class="buy-btn" type="submit">Увійти</button>
        </form>

        <div id="adminArea" class="account-area" hidden>
            <div class="account-row">
                <h3 class="orders-title" style="margin:0;">Всі замовлення</h3>
                <button id="adminLogoutBtn" class="buy-btn account-logout" type="button">Вийти</button>
            </div>
            <div id="adminOrdersList" class="orders-list"></div>
        </div>
    </section>
</main>

<script src="/assets/js/admin.js" defer></script>
</body>
</html>
